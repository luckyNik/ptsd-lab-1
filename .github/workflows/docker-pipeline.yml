name: Docker Build, Push, and Test

on:
  push:
    branches:
      - feature/docker-pipeline
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}

      - name: Build and push test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: tester
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}-tester

  test:
    name: Pull and Test Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Pull the test image
        run: docker pull ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}-tester

      - name: Execute tests inside pulled container
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}-tester
